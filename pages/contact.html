<!DOCTYPE html>
<html lang="uk">
<head>
  <link rel="stylesheet" href="../assets/styles/style.css">
  <link rel="stylesheet" href="../assets/styles/responsive.css">
  <meta charset="UTF-8">
  <title>Контакти</title>
</head>
<body>

<header>
  <div class="container">
    <nav>
      <a href="../index.html">Головна</a>
      <a href="about.html">Про мене</a>
      <a href="contact.html">Контакти</a>
    </nav>
  </div>
</header>

<main class="container">

  <div class="card">
    <h1>Контакти</h1>

    <form action="#" method="get">

      <div class="form-group">
        <label for="name">Ім’я</label>
        <input id="name" name="name" type="text" required>
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" required>
      </div>

      <div class="form-group">
        <label for="phone">Телефон</label>
        <input id="phone" name="phone" type="tel">
      </div>

      <div class="form-group">
        <label for="topic">Тема</label>
        <select id="topic" name="topic">
          <option>Навчання</option>
          <option>Робота</option>
        </select>
      </div>

      <div class="form-group">
        <p>Спосіб зв'язку:</p>
        <label><input type="radio" name="way" value="email" checked> Email</label>
        <label><input type="radio" name="way" value="phone"> Телефон</label>
      </div>

      <div class="form-group">
        <label for="message">Повідомлення</label>
        <textarea id="message" name="message" rows="4"></textarea>
      </div>

      <div class="form-group">
        <label>
          <input type="checkbox" required> Згоден з правилами
        </label>
      </div>

      <button type="submit">Надіслати</button>

    </form>
  </div>

</main>

<footer>
  <p>&copy; 2026</p>
</footer>

</body>
</html>
