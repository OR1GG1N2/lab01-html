<h1>Контакти</h1>

<form action="#" method="get">

  <label for="name">Ім’я:</label>
  <input id="name" name="name" type="text" required><br>

  <label for="email">Email:</label>
  <input id="email" name="email" type="email" required><br>

  <label for="phone">Телефон:</label>
  <input id="phone" name="phone" type="tel"><br>

  <label for="topic">Тема:</label>
  <select id="topic" name="topic">
    <option>Навчання</option>
    <option>Робота</option>
  </select><br>

  <p>Спосіб зв'язку:</p>
  <label><input type="radio" name="way" value="email" checked> Email</label>
  <label><input type="radio" name="way" value="phone"> Телефон</label><br>

  <label for="message">Повідомлення:</label><br>
  <textarea id="message" name="message"></textarea><br>

  <label>
    <input type="checkbox" required> Згоден
  </label><br>

  <button type="submit">Надіслати</button>

</form>

</body>
</html>
